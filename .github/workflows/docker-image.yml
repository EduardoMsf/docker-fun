name: Docker Image CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build login
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build and push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USER }}
        run: |
          docker build -t $DOCKER_USERNAME/graphql-actions:0.0.3 .
          docker build -t $DOCKER_USERNAME/graphql-actions:latest .
          docker push $DOCKER_USERNAME/graphql-actions:0.0.3
          docker push $DOCKER_USERNAME/graphql-actions:latest
