name: Docker Image CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git Semantic Version
        uses: PaulHatch/semantic-version@v4.0.3
        with:
          major_pattern: 'major:'
          minor_pattern: 'feat:'
          format: '${major}.${minor}.${patch}-prerelease${increment}'
        id: version

      - name: Build login
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build and push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USER }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker build -t $DOCKER_USERNAME/graphql-actions:$NEW_VERSION .
          docker build -t $DOCKER_USERNAME/graphql-actions:latest .
          docker push $DOCKER_USERNAME/graphql-actions:$NEW_VERSION
          docker push $DOCKER_USERNAME/graphql-actions:latest
